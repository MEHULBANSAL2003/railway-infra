services:
  auth-service:
    image: ghcr.io/mehulbansal2003/railway-auth-service:stable
    container_name: railtick-auth-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=optional:file:/run/secrets/auth-prod.properties
    volumes:
      - ./secrets/auth-prod.properties:/run/secrets/auth-prod.properties:ro
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /railtick/prod/auth-service
        awslogs-stream: auth-service
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  main-service:
    image: ghcr.io/mehulbansal2003/railway-main-service:stable
    container_name: railtick-main-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=optional:file:/run/secrets/main-prod.properties
    volumes:
      - ./secrets/main-prod.properties:/run/secrets/main-prod.properties:ro
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /railtick/prod/main-service
        awslogs-stream: main-service
        awslogs-create-group: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    image: ghcr.io/mehulbansal2003/railway-notification-service:stable
    container_name: railtick-notification-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=optional:file:/run/secrets/notification-prod.properties
    volumes:
      - ./secrets/notification-prod.properties:/run/secrets/notification-prod.properties:ro
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: /railtick/prod/notification-service
        awslogs-stream: notification-service
        awslogs-create-group: "true"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
