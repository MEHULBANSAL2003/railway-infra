upstream auth_service {
    server 127.0.0.1:8080;
}

upstream main_service {
    server 127.0.0.1:8082;
}

upstream notification_service {
    server 127.0.0.1:8083;
}

server {
    listen 80;
    server_name api.railtick.in;

    # common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;

    location /api/auth {
        proxy_pass http://auth_service/api/auth;
    }

    location /api/admin {
        proxy_pass http://auth_service/api/admin;
    }

    location /api/user {
        proxy_pass http://auth_service/api/user;
    }

    location /api/main {
            proxy_pass http://main_service/api/main;
    }

    location /api/notification {
            proxy_pass http://notification_service/api/notification
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
